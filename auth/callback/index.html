<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SoRita açılıyor</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(440px, calc(100% - 32px));
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 22px;
        color: #475569;
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: #7c3aed;
        color: white;
        font-weight: 700;
        padding: 0 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SoRita açılıyor…</h1>
      <p>Uygulama otomatik açılmazsa aşağıdaki butona bas.</p>
      <a id="open-app" href="sorita://auth/callback">Uygulamayı aç</a>
    </main>
    <script>
      (function () {
        function mergeParams() {
          var params = new URLSearchParams(window.location.search);
          var hash = window.location.hash.replace(/^#/, "");
          var hashParams = new URLSearchParams(hash);
          hashParams.forEach(function (value, key) {
            params.set(key, value);
          });
          return params.toString();
        }

        var suffix = mergeParams();
        var appUrl = "sorita://auth/callback" + (suffix ? "?" + suffix : "");
        var button = document.getElementById("open-app");
        button.setAttribute("href", appUrl);
        window.setTimeout(function () {
          window.location.assign(appUrl);
        }, 250);
      })();
    </script>
  </body>
</html>
